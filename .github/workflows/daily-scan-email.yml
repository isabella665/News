name: Daily Morning Scan

on:
  schedule:
    # 9:00 AM Amsterdam time (CET=UTC+1 / CEST=UTC+2); using UTC+2 (summer)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  create-daily-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Get today's date
        id: date
        run: echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create daily scan issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `☀️ Daily AI News Scan — ${{ steps.date.outputs.today }}`,
              body: `**Time budget: ~10 minutes**

## Morning Checklist
- [ ] Check **AI-News-Alerts** inbox folder (Google Alerts)
- [ ] Skim overnight newsletters
- [ ] Flag anything with a comms angle → add to ideas bank

## Google Alert Terms Active
- AI governance
- responsible AI regulation
- AI safety legislation
- AI public opinion
- Anthropic
- OpenAI
- Google DeepMind

## Flag an item if it has any of:
- Relevance to AI governance, safety, or regulation
- A named org angle (Anthropic, OpenAI, Google DeepMind, policymakers)
- Potential reputational or narrative impact
- Surprising public opinion data

## Ideas Bank Entry

\`\`\`
Headline:
Source:
Comms angle:
Format idea:  (thread / op-ed / reactive statement / explainer / pitch)
Priority:     High / Medium / Low
\`\`\`
`,
              labels: ['daily-scan']
            });
