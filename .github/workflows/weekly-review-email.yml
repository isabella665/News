name: Weekly Monday Review

on:
  schedule:
    # 9:00 AM Amsterdam time (CET=UTC+1 / CEST=UTC+2); using UTC+2 (summer)
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  create-weekly-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get week dates
        id: date
        run: |
          echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "week=$(date +%Y-W%V)" >> $GITHUB_OUTPUT

      - name: Create weekly review issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📋 Weekly AI News Review — ${{ steps.date.outputs.week }}`,
              body: `**Monday check-in prep.** Review flagged items and fill in the short list for today's team meeting.

## Short List for Check-in

| # | Story | Comms Angle | Format | Voice | Priority |
|---|-------|-------------|--------|-------|----------|
| 1 | | | | | |
| 2 | | | | | |
| 3 | | | | | |

## Themes This Week
<!-- 2-3 sentences on the week's dominant narrative(s) -->

## Items Carried Forward
<!-- Flagged items from last week that still have legs -->

## Decisions Needed
<!-- What the team needs to greenlight or pass on -->

---
**Format options:** Thread · Op-ed · Reactive statement · Press pitch · Explainer · Social post · Internal briefing

**Voice options:** Executive · Company/institutional · Technical/product · Policy/external affairs
`,
              labels: ['weekly-review']
            });
